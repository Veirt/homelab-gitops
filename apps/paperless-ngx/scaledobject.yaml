---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: paperless-ngx
spec:
  scaleTargetRef:
    name: paperless-ngx
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
    - type: cron
      metadata:
        timezone: Asia/Singapore
        start: 0 8 * * *
        end: 0 0 * * *
        desiredReplicas: "1"
