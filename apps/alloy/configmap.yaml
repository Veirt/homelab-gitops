---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
data:
  config.river: |
    // --- Host metrics ---
    prometheus.exporter.unix "localhost" {
      procfs_path   = "/host/proc"
      sysfs_path    = "/host/sys"
      rootfs_path   = "/host/root"
      include_exporter_metrics = true
      set_collectors = ["cpu", "diskstats", "filesystem", "hwmon", "loadavg", "meminfo", "netdev", "netstat", "os", "sockstat", "stat", "time", "uname", "vmstat"]
    }

    discovery.relabel "host_metrics" {
      targets = prometheus.exporter.unix.localhost.targets
      rule {
        source_labels = ["instance"]
        target_label  = "host"
      }
    }

    prometheus.scrape "host_metrics" {
      targets    = discovery.relabel.host_metrics.output
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "http://victoria-service:8428/api/v1/write"
      }
    }

    // --- Kubernetes pod logs ---
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "filter_pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action = "keep"
        regex = "default"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action = "drop"
        regex = "alloy"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action = "keep"
        regex = ".+"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.filter_pods.output
      forward_to = [loki.process.pod_logs.receiver]
    }

    loki.process "pod_logs" {
      stage.static_labels {
        values = {
          cluster = "home",
        }
      }

      stage.labels {
        values = {
          namespace = "__meta_kubernetes_namespace",
          pod       = "__meta_kubernetes_pod_name",
          container = "__meta_kubernetes_pod_container_name",
          app       = "__meta_kubernetes_pod_label_app",
        }
      }

      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "http://loki-service:3100/loki/api/v1/push"
      }
      external_labels = {
        cluster = "home",
      }
    }
