---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: appflowy-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: appflowy
      owner: appflowy
  postgresql:
    parameters:
      shared_preload_libraries: "vector"
    extensions:
      - name: vector
        image: ghcr.io/cloudnative-pg/postgresql-extension-pgvector:18
