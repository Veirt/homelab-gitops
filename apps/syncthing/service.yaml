---
apiVersion: v1
kind: Service
metadata:
  name: syncthing-service
spec:
  selector:
    app: syncthing
  ports:
    - protocol: TCP
      port: 8384
      targetPort: 8384
      name: web-ui
    - protocol: TCP
      port: 22000
      targetPort: 22000
      name: sync
    - protocol: UDP
      port: 22000
      targetPort: 22000
      name: quic-sync
    - protocol: UDP
      port: 22000
      targetPort: 22000
      name: discovery
  type: LoadBalancer
