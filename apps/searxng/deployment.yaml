---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.6.24-e3126b89e
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 192Mi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/searxng
              subPath: searxng
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: data-pvc
