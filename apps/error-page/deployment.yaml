---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: errorpages
spec:
  replicas: 1
  selector:
    matchLabels: {app: errorpages}
  template:
    metadata:
      labels: {app: errorpages}
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: veirt.dev/node-pool
                    operator: In
                    values:
                      - vps
      tolerations:
        - key: "veirt.dev/node-pool"
          operator: "Equal"
          value: "vps"
          effect: "NoSchedule"
      containers:
        - name: nginx
          image: nginx:alpine
          ports: [{containerPort: 80}]
          resources:
            requests:
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - {name: html, mountPath: /usr/share/nginx/html, readOnly: true}
            - {name: nginx, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true}
      volumes:
        - name: html
          configMap: {name: errorpages-html}
        - name: nginx
          configMap: {name: errorpages-nginx}
