---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cypht-php-config
data:
  zz-pool.conf: |
    pm = dynamic
    pm.max_children = 25
    pm.start_servers = 8
    pm.min_spare_servers = 4
    pm.max_spare_servers = 12
    pm.max_requests = 500

  zz-opcache.ini: |
    opcache.enable = 1
    opcache.memory_consumption = 128
    opcache.interned_strings_buffer = 8
    opcache.max_accelerated_files = 4000
    opcache.revalidate_freq = 60
