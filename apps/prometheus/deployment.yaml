---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.11.3
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
              subPath: prometheus
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: data-pvc
