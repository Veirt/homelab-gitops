---
apiVersion: v1
kind: Namespace
metadata:
  name: keda
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keda
  namespace: keda
spec:
  interval: 24h
  url: https://kedacore.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 6h
  chart:
    spec:
      chart: keda
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: keda
        namespace: keda
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    operator:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi
    metricsServer:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi
    webhooks:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 64Mi
    grpcServer:
      enabled: false
    prometheus:
      operator:
        enabled: true
      metricsServer:
        enabled: true
      webhooks:
        enabled: true
    podDisruptionBudget:
      operator:
        enabled: false
      metricsServer:
        enabled: false
      webhooks:
        enabled: false
